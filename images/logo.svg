<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e0c772"/>
    </linearGradient>
  </defs>
  <!-- Rock crystal shape -->
  <polygon points="100,20 160,60 140,130 60,130 40,60" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner faceted lines -->
  <line x1="100" y1="20" x2="100" y2="130" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="60" x2="140" y2="60" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="60" x2="60" y2="130" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="60" x2="140" y2="130" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <!-- Base -->
  <rect x="70" y="130" width="60" height="8" rx="2" fill="url(#gold)" opacity="0.5"/>
  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="url(#gold)">金岩石</text>
</svg>
